<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="600" fill="#0D1117" />

  <!-- Timeline Axis Line -->
  <line x1="150" y1="80" x2="870" y2="80" stroke="#F8F8F2" stroke-width="2" />
  
  <!-- Axis Ticks & Labels -->
  <!-- 2015-01-01 -->
  <line x1="150" y1="75" x2="150" y2="85" stroke="#F8F8F2" stroke-width="2" />
  <text x="150" y="65" fill="#F8F8F2" font-family="monospace" font-size="11" text-anchor="middle">2015-01</text>

  <!-- 2015-07-01 -->
  <line x1="281" y1="75" x2="281" y2="85" stroke="#F8F8F2" stroke-width="1.5" />
  <text x="281" y="65" fill="#F8F8F2" font-family="monospace" font-size="11" text-anchor="middle">2015-07</text>

  <!-- 2016-01-01 -->
  <line x1="412" y1="75" x2="412" y2="85" stroke="#F8F8F2" stroke-width="2" />
  <text x="412" y="65" fill="#F8F8F2" font-family="monospace" font-size="11" text-anchor="middle">2016-01</text>

  <!-- 2016-07-01 -->
  <line x1="543" y1="75" x2="543" y2="85" stroke="#F8F8F2" stroke-width="1.5" />
  <text x="543" y="65" fill="#F8F8F2" font-family="monospace" font-size="11" text-anchor="middle">2016-07</text>

  <!-- 2017-01-01 -->
  <line x1="674" y1="75" x2="674" y2="85" stroke="#F8F8F2" stroke-width="2" />
  <text x="674" y="65" fill="#F8F8F2" font-family="monospace" font-size="11" text-anchor="middle">2017-01</text>

  <!-- 2017-07-01 -->
  <line x1="805" y1="75" x2="805" y2="85" stroke="#F8F8F2" stroke-width="1.5" />
  <text x="805" y="65" fill="#F8F8F2" font-family="monospace" font-size="11" text-anchor="middle">2017-07</text>

  <!-- 2017-10-01 (End) -->
  <line x1="870" y1="75" x2="870" y2="85" stroke="#F8F8F2" stroke-width="2" />
  <text x="870" y="65" fill="#F8F8F2" font-family="monospace" font-size="11" text-anchor="middle">2017-10</text>

  <!-- FOLDS -->
  <!-- FOLD 1 -->
  <g transform="translate(0, 110)">
    <text x="50" y="22" fill="#F8F8F2" font-family="sans-serif" font-size="12" font-weight="bold">Fold 1</text>
    <!-- Train Bar (Purple) -->
    <rect x="150" y="5" width="393" height="25" rx="4" fill="#BD93F9" filter="url(#glow-purple)" opacity="0.85" />
    <text x="346" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Train (18m)</text>
    <!-- Test Bar (Orange) -->
    <rect x="543" y="5" width="65" height="25" rx="4" fill="#FF6B35" filter="url(#glow-orange)" />
    <text x="575" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Val</text>
    <!-- MAPE Badge -->
    <rect x="618" y="7" width="95" height="20" rx="3" fill="#1E1E2E" stroke="#FFB86C" stroke-width="1" />
    <text x="665" y="21" fill="#FFB86C" font-family="monospace" font-size="10.5" font-weight="bold" text-anchor="middle">MAPE: 9.60%</text>
  </g>

  <!-- FOLD 2 -->
  <g transform="translate(0, 170)">
    <text x="50" y="22" fill="#F8F8F2" font-family="sans-serif" font-size="12" font-weight="bold">Fold 2</text>
    <!-- Train Bar (Purple) -->
    <rect x="150" y="5" width="458" height="25" rx="4" fill="#BD93F9" filter="url(#glow-purple)" opacity="0.85" />
    <text x="379" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Train (21m)</text>
    <!-- Test Bar (Orange) -->
    <rect x="608" y="5" width="66" height="25" rx="4" fill="#FF6B35" filter="url(#glow-orange)" />
    <text x="641" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Val</text>
    <!-- MAPE Badge -->
    <rect x="684" y="7" width="95" height="20" rx="3" fill="#1E1E2E" stroke="#FFB86C" stroke-width="1" />
    <text x="731" y="21" fill="#FFB86C" font-family="monospace" font-size="10.5" font-weight="bold" text-anchor="middle">MAPE: 11.75%</text>
  </g>

  <!-- FOLD 3 -->
  <g transform="translate(0, 230)">
    <text x="50" y="22" fill="#F8F8F2" font-family="sans-serif" font-size="12" font-weight="bold">Fold 3</text>
    <!-- Train Bar (Purple) -->
    <rect x="150" y="5" width="524" height="25" rx="4" fill="#BD93F9" filter="url(#glow-purple)" opacity="0.85" />
    <text x="412" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Train (24m)</text>
    <!-- Test Bar (Orange) -->
    <rect x="674" y="5" width="65" height="25" rx="4" fill="#FF6B35" filter="url(#glow-orange)" />
    <text x="706" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Val</text>
    <!-- MAPE Badge -->
    <rect x="749" y="7" width="95" height="20" rx="3" fill="#1E1E2E" stroke="#FFB86C" stroke-width="1" />
    <text x="796" y="21" fill="#FFB86C" font-family="monospace" font-size="10.5" font-weight="bold" text-anchor="middle">MAPE: 11.19%</text>
  </g>

  <!-- FOLD 4 -->
  <g transform="translate(0, 290)">
    <text x="50" y="22" fill="#F8F8F2" font-family="sans-serif" font-size="12" font-weight="bold">Fold 4</text>
    <!-- Train Bar (Purple) -->
    <rect x="150" y="5" width="589" height="25" rx="4" fill="#BD93F9" filter="url(#glow-purple)" opacity="0.85" />
    <text x="444" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Train (27m)</text>
    <!-- Test Bar (Orange) -->
    <rect x="739" y="5" width="66" height="25" rx="4" fill="#FF6B35" filter="url(#glow-orange)" />
    <text x="772" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Val</text>
    <!-- MAPE Badge -->
    <rect x="815" y="7" width="95" height="20" rx="3" fill="#1E1E2E" stroke="#FFB86C" stroke-width="1" />
    <text x="862" y="21" fill="#FFB86C" font-family="monospace" font-size="10.5" font-weight="bold" text-anchor="middle">MAPE: 8.92%</text>
  </g>

  <!-- FINAL CUTOFF LINE (2017-07-01) -->
  <line x1="805" y1="90" x2="805" y2="500" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6 4" />
  <rect x="750" y="475" width="110" height="20" rx="4" fill="#0D1117" stroke="#FF6B35" stroke-width="1" />
  <text x="805" y="489" fill="#FF6B35" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">FINAL CUTOFF</text>

  <!-- Divider Line -->
  <line x1="80" y1="360" x2="920" y2="360" stroke="#1E1E2E" stroke-width="1" />

  <!-- PRODUCTION DEPLOYMENT -->
  <!-- Final Model -->
  <g transform="translate(0, 390)">
    <text x="50" y="22" fill="#F8F8F2" font-family="sans-serif" font-size="12" font-weight="bold">Production</text>
    <!-- Train Bar (Purple) -->
    <rect x="150" y="5" width="655" height="25" rx="4" fill="#BD93F9" filter="url(#glow-purple)" />
    <text x="477" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Final Model Trained on All Data (30m: Jan 2015 to Jun 2017)</text>
    <!-- Holdout Test (Green) -->
    <rect x="805" y="5" width="65" height="25" rx="4" fill="#39D353" filter="url(#glow-green)" />
    <text x="837" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle">Holdout</text>
  </g>

  <!-- Description Info Boxes -->
  <g transform="translate(150, 480)">
    <rect width="250" height="70" rx="6" fill="#1E1E2E" stroke="#BD93F9" stroke-width="1.5" />
    <text x="15" y="25" fill="#F8F8F2" font-family="sans-serif" font-size="11" font-weight="bold">Train Window Expansion:</text>
    <text x="15" y="42" fill="#BD93F9" font-family="sans-serif" font-size="10">Fold 1 starts with 18 months.</text>
    <text x="15" y="56" fill="#BD93F9" font-family="sans-serif" font-size="10">Each fold adds 3 months of training.</text>
  </g>

  <g transform="translate(430, 480)">
    <rect width="270" height="70" rx="6" fill="#1E1E2E" stroke="#FF6B35" stroke-width="1.5" />
    <text x="15" y="25" fill="#F8F8F2" font-family="sans-serif" font-size="11" font-weight="bold">90-Day Validation Sliders:</text>
    <text x="15" y="42" fill="#FF6B35" font-family="sans-serif" font-size="10">Validation is strictly out-of-sample.</text>
    <text x="15" y="56" fill="#FF6B35" font-family="sans-serif" font-size="10">Measures short-term seasonal stability.</text>
  </g>

  <!-- Summary metric -->
  <g transform="translate(730, 510)">
    <text x="0" y="15" fill="#F8F8F2" font-family="sans-serif" font-size="11" font-weight="bold">Holdout Deployment:</text>
    <text x="0" y="32" fill="#39D353" font-family="monospace" font-size="10.5" font-weight="bold">Jul - Sep 2017 (90 days)</text>
  </g>

</svg>
