<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850" width="100%" height="100%">
  <defs>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="0.8"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BD93F9" />
      <stop offset="100%" stop-color="#8BE9FD" />
    </linearGradient>
  </defs>

  <rect width="1000" height="850" fill="#0D1117" />

  <!-- Flow Lines / Connections -->
  <g stroke="#FF6B35" stroke-width="3" fill="none">
    <!-- Raw CSV to Data Loader -->
    <path d="M 500 90 L 500 135" />
    <!-- Data Loader to Features -->
    <path d="M 500 185 L 500 225" />
    <!-- Features to Model -->
    <path d="M 500 275 L 500 315" />
    <!-- Features to Processed CSV (Fork Left) -->
    <path d="M 500 250 H 250 V 315" stroke-dasharray="5 5" stroke="#00D4FF" />
    <!-- Model to Folds / Bootstrap (Forks) -->
    <path d="M 500 365 V 400 H 350 V 435" />
    <path d="M 500 400 H 650 V 435" />
    <!-- Folds & Bootstrap back to Inventory (Merges) -->
    <path d="M 350 485 V 520 H 500 V 555" />
    <path d="M 650 485 V 520 H 500" />
    <!-- Inventory to Main.py -->
    <path d="M 500 605 L 500 645" />
    <!-- Main.py to Outputs -->
    <path d="M 500 695 L 500 735" stroke-dasharray="5 5" stroke="#39D353" />
  </g>

  <!-- Node 1: Raw Data File (Cyan, Dashed) -->
  <g transform="translate(350, 40)">
    <rect width="300" height="50" rx="6" fill="#1E1E2E" stroke="#00D4FF" stroke-width="2" stroke-dasharray="6 4" />
    <text x="150" y="24" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">data/raw/train.csv</text>
    <text x="150" y="40" fill="#00D4FF" font-family="sans-serif" font-size="10" text-anchor="middle">Raw Sales Transactions (Read-only)</text>
  </g>

  <!-- Node 2: Data Loader (Purple, Glowing) -->
  <g transform="translate(325, 135)">
    <rect width="350" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
    <text x="175" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">src/data_loader.py</text>
    <text x="175" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">Parses dates, clips sales &gt;= 1</text>
    <!-- Badge -->
    <rect x="280" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
    <text x="310" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ 0.3s</text>
  </g>

  <!-- Node 3: Features.py (Purple, Glowing) -->
  <g transform="translate(325, 225)">
    <rect width="350" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
    <text x="175" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">src/features.py</text>
    <text x="175" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">Lags, rolling stats, holidays</text>
    <!-- Badge -->
    <rect x="280" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
    <text x="310" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ 7.0s</text>
  </g>

  <!-- Node 4: Processed Features CSV (Cyan, Dashed) -->
  <g transform="translate(100, 315)">
    <rect width="300" height="50" rx="6" fill="#1E1E2E" stroke="#00D4FF" stroke-width="2" stroke-dasharray="6 4" />
    <text x="150" y="24" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">data/processed/features.csv</text>
    <text x="150" y="40" fill="#00D4FF" font-family="sans-serif" font-size="10" text-anchor="middle">271MB written to disk (No leakage)</text>
  </g>

  <!-- Node 5: Model.py (Purple, Glowing) -->
  <g transform="translate(325, 315)">
    <rect width="350" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
    <text x="175" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">src/model.py</text>
    <text x="175" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">Trains LightGBM, saves residuals</text>
    <!-- Badge -->
    <rect x="280" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
    <text x="310" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ 45.0s</text>
  </g>

  <!-- Node 6: Evaluate.py (Purple, Glowing) -->
  <g transform="translate(175, 435)">
    <rect width="320" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
    <text x="160" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">src/evaluate.py</text>
    <text x="160" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">4-fold walk-forward backtest</text>
    <!-- Badge -->
    <rect x="250" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
    <text x="280" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ 12.0s</text>
  </g>

  <!-- Node 7: Prediction Intervals (Purple, Glowing) -->
  <g transform="translate(505, 435)">
    <rect width="320" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
    <text x="160" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Prediction Intervals</text>
    <text x="160" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">100 bootstrap loops</text>
    <!-- Badge -->
    <rect x="250" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
    <text x="280" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ 8.0s</text>
  </g>

  <!-- Node 8: Inventory.py (Purple, Glowing) -->
  <g transform="translate(325, 555)">
    <rect width="350" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
    <text x="175" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">src/inventory.py</text>
    <text x="175" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">Converts errors to INR savings</text>
    <!-- Badge -->
    <rect x="280" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
    <text x="310" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ 2.0s</text>
  </g>

  <!-- Node 9: Main.py (Purple, Glowing) -->
  <g transform="translate(325, 645)">
    <rect width="350" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
    <text x="175" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">main.py</text>
    <text x="175" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">Pipeline coordinator</text>
    <!-- Badge -->
    <rect x="280" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
    <text x="310" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ ~67s</text>
  </g>

  <!-- Node 10: Outputs (Green, Glowing/Solid) -->
  <g transform="translate(325, 735)">
    <rect width="350" height="50" rx="8" fill="#1E1E2E" stroke="#39D353" stroke-width="2" filter="url(#glow-orange)" />
    <text x="175" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">outputs/plots &amp; results</text>
    <text x="175" y="38" fill="#39D353" font-family="sans-serif" font-size="11" text-anchor="middle">Saves 10 plots + results CSVs</text>
  </g>
</svg>
