<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Walk-Forward Backtesting - Demand Oracle</title>
  <style>
    body {
      background-color: #0D1117;
      color: #F8F8F2;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1 {
      color: #FF6B35;
      font-size: 1.8rem;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 107, 53, 0.4);
    }
    .container {
      width: 90%;
      max-width: 950px;
      background: #1E1E2E;
      border: 1px solid #BD93F9;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(189, 147, 249, 0.15);
      padding: 20px;
      margin: 20px 0;
      position: relative;
    }
    svg {
      width: 100%;
      height: auto;
    }
    .node {
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .node:hover {
      transform: translateY(-2px);
    }
    .tooltip {
      position: absolute;
      background: #0D1117;
      color: #F8F8F2;
      padding: 10px;
      border: 1px solid #FF6B35;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      box-shadow: 0 0 15px rgba(255, 107, 53, 0.3);
      max-width: 300px;
      z-index: 10;
    }
    
    /* Animations */
    .bar {
      transform-origin: 150px center;
      transform: scaleX(0);
      animation: grow-bar 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    .badge {
      opacity: 0;
      animation: fade-in 0.8s ease-out forwards;
    }
    .pulse-glow {
      animation: pulse-glow-anim 2s infinite alternate;
    }
    @keyframes grow-bar {
      to {
        transform: scaleX(1);
      }
    }
    @keyframes fade-in {
      to {
        opacity: 1;
      }
    }
    @keyframes pulse-glow-anim {
      0% {
        filter: drop-shadow(0 0 2px #FF6B35);
        opacity: 0.85;
      }
      100% {
        filter: drop-shadow(0 0 8px #FF6B35);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <h1>Walk-Forward Backtesting Timeline</h1>
  <div class="container">
    <div class="tooltip" id="tooltip">Hover over folds or timeline elements to view fold boundaries!</div>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600">
      <defs>
        <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="4" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
        <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="5" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
        <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="4" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>

      <!-- Timeline Axis Line -->
      <line x1="150" y1="80" x2="870" y2="80" stroke="#F8F8F2" stroke-width="2" />
      
      <!-- Axis Ticks & Labels -->
      <g stroke="#F8F8F2" stroke-width="1.5">
        <line x1="150" y1="75" x2="150" y2="85" />
        <line x1="281" y1="75" x2="281" y2="85" />
        <line x1="412" y1="75" x2="412" y2="85" />
        <line x1="543" y1="75" x2="543" y2="85" />
        <line x1="674" y1="75" x2="674" y2="85" />
        <line x1="805" y1="75" x2="805" y2="85" />
        <line x1="870" y1="75" x2="870" y2="85" />
      </g>
      
      <g fill="#F8F8F2" font-family="monospace" font-size="11" text-anchor="middle">
        <text x="150" y="65">2015-01</text>
        <text x="281" y="65">2015-07</text>
        <text x="412" y="65">2016-01</text>
        <text x="543" y="65">2016-07</text>
        <text x="674" y="65">2017-01</text>
        <text x="805" y="65">2017-07</text>
        <text x="870" y="65">2017-10</text>
      </g>

      <!-- FOLDS -->
      <!-- FOLD 1 -->
      <g class="node" transform="translate(0, 110)" data-desc="Fold 1: Train from Jan 2015 to Jun 2016 (18 months). Validates on Jul-Sep 2016 (90 days). Out-of-sample MAPE: 9.60%. Significant improvement over baseline.">
        <text x="50" y="22" fill="#F8F8F2" font-family="sans-serif" font-size="12" font-weight="bold">Fold 1</text>
        <!-- Train Bar (Purple) -->
        <rect class="bar" x="150" y="5" width="393" height="25" rx="4" fill="#BD93F9" filter="url(#glow-purple)" style="animation-delay: 0s;" />
        <text class="badge" x="346" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" style="animation-delay: 0.8s;">Train (18m)</text>
        <!-- Test Bar (Orange) -->
        <rect class="bar pulse-glow" x="543" y="5" width="65" height="25" rx="4" fill="#FF6B35" filter="url(#glow-orange)" style="animation-delay: 0.2s;" />
        <text class="badge" x="575" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" style="animation-delay: 0.9s;">Val</text>
        <!-- MAPE Badge -->
        <g class="badge" style="animation-delay: 1.2s;">
          <rect x="618" y="7" width="95" height="20" rx="3" fill="#1E1E2E" stroke="#FFB86C" stroke-width="1" />
          <text x="665" y="21" fill="#FFB86C" font-family="monospace" font-size="10.5" font-weight="bold" text-anchor="middle">MAPE: 9.60%</text>
        </g>
      </g>

      <!-- FOLD 2 -->
      <g class="node" transform="translate(0, 170)" data-desc="Fold 2: Train from Jan 2015 to Sep 2016 (21 months). Validates on Oct-Dec 2016 (90 days). Out-of-sample MAPE: 11.75%. Validates behavior over peak Q4 holiday shopping spikes.">
        <text x="50" y="22" fill="#F8F8F2" font-family="sans-serif" font-size="12" font-weight="bold">Fold 2</text>
        <!-- Train Bar (Purple) -->
        <rect class="bar" x="150" y="5" width="458" height="25" rx="4" fill="#BD93F9" filter="url(#glow-purple)" style="animation-delay: 0.3s;" />
        <text class="badge" x="379" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" style="animation-delay: 1.1s;">Train (21m)</text>
        <!-- Test Bar (Orange) -->
        <rect class="bar pulse-glow" x="608" y="5" width="66" height="25" rx="4" fill="#FF6B35" filter="url(#glow-orange)" style="animation-delay: 0.5s;" />
        <text class="badge" x="641" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" style="animation-delay: 1.2s;">Val</text>
        <!-- MAPE Badge -->
        <g class="badge" style="animation-delay: 1.5s;">
          <rect x="684" y="7" width="95" height="20" rx="3" fill="#1E1E2E" stroke="#FFB86C" stroke-width="1" />
          <text x="731" y="21" fill="#FFB86C" font-family="monospace" font-size="10.5" font-weight="bold" text-anchor="middle">MAPE: 11.75%</text>
        </g>
      </g>

      <!-- FOLD 3 -->
      <g class="node" transform="translate(0, 230)" data-desc="Fold 3: Train from Jan 2015 to Dec 2016 (24 months). Validates on Jan-Mar 2017 (90 days). Out-of-sample MAPE: 11.19%. Evaluates post-holiday winter drop-off.">
        <text x="50" y="22" fill="#F8F8F2" font-family="sans-serif" font-size="12" font-weight="bold">Fold 3</text>
        <!-- Train Bar (Purple) -->
        <rect class="bar" x="150" y="5" width="524" height="25" rx="4" fill="#BD93F9" filter="url(#glow-purple)" style="animation-delay: 0.6s;" />
        <text class="badge" x="412" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" style="animation-delay: 1.4s;">Train (24m)</text>
        <!-- Test Bar (Orange) -->
        <rect class="bar pulse-glow" x="674" y="5" width="65" height="25" rx="4" fill="#FF6B35" filter="url(#glow-orange)" style="animation-delay: 0.8s;" />
        <text class="badge" x="706" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" style="animation-delay: 1.5s;">Val</text>
        <!-- MAPE Badge -->
        <g class="badge" style="animation-delay: 1.8s;">
          <rect x="749" y="7" width="95" height="20" rx="3" fill="#1E1E2E" stroke="#FFB86C" stroke-width="1" />
          <text x="796" y="21" fill="#FFB86C" font-family="monospace" font-size="10.5" font-weight="bold" text-anchor="middle">MAPE: 11.19%</text>
        </g>
      </g>

      <!-- FOLD 4 -->
      <g class="node" transform="translate(0, 290)" data-desc="Fold 4: Train from Jan 2015 to Mar 2017 (27 months). Validates on Apr-Jun 2017 (90 days). Out-of-sample MAPE: 8.92%. Demonstrates excellent performance during spring sales peaks.">
        <text x="50" y="22" fill="#F8F8F2" font-family="sans-serif" font-size="12" font-weight="bold">Fold 4</text>
        <!-- Train Bar (Purple) -->
        <rect class="bar" x="150" y="5" width="589" height="25" rx="4" fill="#BD93F9" filter="url(#glow-purple)" style="animation-delay: 0.9s;" />
        <text class="badge" x="444" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" style="animation-delay: 1.7s;">Train (27m)</text>
        <!-- Test Bar (Orange) -->
        <rect class="bar pulse-glow" x="739" y="5" width="66" height="25" rx="4" fill="#FF6B35" filter="url(#glow-orange)" style="animation-delay: 1.1s;" />
        <text class="badge" x="772" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" style="animation-delay: 1.8s;">Val</text>
        <!-- MAPE Badge -->
        <g class="badge" style="animation-delay: 2.1s;">
          <rect x="815" y="7" width="95" height="20" rx="3" fill="#1E1E2E" stroke="#FFB86C" stroke-width="1" />
          <text x="862" y="21" fill="#FFB86C" font-family="monospace" font-size="10.5" font-weight="bold" text-anchor="middle">MAPE: 8.92%</text>
        </g>
      </g>

      <!-- FINAL CUTOFF LINE (2017-07-01) -->
      <line class="badge" x1="805" y1="90" x2="805" y2="500" stroke="#FF6B35" stroke-width="2" stroke-dasharray="6 4" style="animation-delay: 1s;" />
      <g class="badge" style="animation-delay: 1.2s;">
        <rect x="750" y="475" width="110" height="20" rx="4" fill="#0D1117" stroke="#FF6B35" stroke-width="1" />
        <text x="805" y="489" fill="#FF6B35" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">FINAL CUTOFF</text>
      </g>

      <!-- Divider Line -->
      <line x1="80" y1="360" x2="920" y2="360" stroke="#1E1E2E" stroke-width="1" />

      <!-- PRODUCTION DEPLOYMENT -->
      <!-- Final Model -->
      <g class="node" transform="translate(0, 390)" data-desc="Production Model: Re-trained on 100% of available historical data up to the final cutoff date of 2017-07-01. Evaluated on the completely unseen holdout set.">
        <text x="50" y="22" fill="#F8F8F2" font-family="sans-serif" font-size="12" font-weight="bold">Production</text>
        <!-- Train Bar (Purple) -->
        <rect class="bar" x="150" y="5" width="655" height="25" rx="4" fill="#BD93F9" filter="url(#glow-purple)" style="animation-delay: 1.4s;" />
        <text class="badge" x="477" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" style="animation-delay: 2.2s;">Final Model Trained on All Data (30m: Jan 2015 to Jun 2017)</text>
        <!-- Holdout Test (Green) -->
        <rect class="bar" x="805" y="5" width="65" height="25" rx="4" fill="#39D353" filter="url(#glow-green)" style="animation-delay: 1.6s;" />
        <text class="badge" x="837" y="21" fill="#0D1117" font-family="monospace" font-size="10" font-weight="bold" text-anchor="middle" style="animation-delay: 2.4s;">Holdout</text>
      </g>

      <!-- Description Info Boxes -->
      <g class="node" transform="translate(150, 480)" data-desc="Train Window Details: The train set expands incrementally. This guarantees our models learn long-term trend parameters and seasonal variances spanning multiple years.">
        <rect width="250" height="70" rx="6" fill="#1E1E2E" stroke="#BD93F9" stroke-width="1.5" />
        <text x="15" y="25" fill="#F8F8F2" font-family="sans-serif" font-size="11" font-weight="bold">Train Window Expansion:</text>
        <text x="15" y="42" fill="#BD93F9" font-family="sans-serif" font-size="10">Fold 1 starts with 18 months.</text>
        <text x="15" y="56" fill="#BD93F9" font-family="sans-serif" font-size="10">Each fold adds 3 months of training.</text>
      </g>

      <g class="node" transform="translate(430, 480)" data-desc="Validation Details: We validate on a rolling 90-day window. This replicates real retail environments where forecasts are refreshed quarterly for seasonal inventory planning.">
        <rect width="270" height="70" rx="6" fill="#1E1E2E" stroke="#FF6B35" stroke-width="1.5" />
        <text x="15" y="25" fill="#F8F8F2" font-family="sans-serif" font-size="11" font-weight="bold">90-Day Validation Sliders:</text>
        <text x="15" y="42" fill="#FF6B35" font-family="sans-serif" font-size="10">Validation is strictly out-of-sample.</text>
        <text x="15" y="56" fill="#FF6B35" font-family="sans-serif" font-size="10">Measures short-term seasonal stability.</text>
      </g>

      <!-- Summary metric -->
      <g class="node" transform="translate(730, 510)" data-desc="Holdout Details: Unseen holdout split. Represents out-of-sample data after 2017-07-01. Used to verify the final deployed model accuracy.">
        <text x="0" y="15" fill="#F8F8F2" font-family="sans-serif" font-size="11" font-weight="bold">Holdout Deployment:</text>
        <text x="0" y="32" fill="#39D353" font-family="monospace" font-size="10.5" font-weight="bold">Jul - Sep 2017 (90 days)</text>
      </g>

    </svg>
  </div>

  <script>
    const nodes = document.querySelectorAll('.node');
    const tooltip = document.getElementById('tooltip');

    nodes.forEach(node => {
      node.addEventListener('mousemove', (e) => {
        const desc = node.getAttribute('data-desc');
        tooltip.textContent = desc;
        tooltip.style.opacity = '1';
        tooltip.style.left = (e.pageX - 120) + 'px';
        tooltip.style.top = (e.pageY - 100) + 'px';
      });

      node.addEventListener('mouseleave', () => {
        tooltip.style.opacity = '0';
      });
    });
  </script>
</body>
</html>
