<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Architecture Pipeline - Demand Oracle</title>
  <style>
    body {
      background-color: #0D1117;
      color: #F8F8F2;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1 {
      color: #FF6B35;
      font-size: 1.8rem;
      margin-top: 20px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 107, 53, 0.4);
    }
    .container {
      width: 90%;
      max-width: 900px;
      background: #1E1E2E;
      border: 1px solid #BD93F9;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(189, 147, 249, 0.15);
      padding: 20px;
      margin: 20px 0;
      position: relative;
    }
    svg {
      width: 100%;
      height: auto;
    }
    .node {
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .node:hover {
      filter: drop-shadow(0px 0px 10px #FF6B35);
      transform: scale(1.02);
    }
    .tooltip {
      position: absolute;
      background: #0D1117;
      color: #F8F8F2;
      padding: 10px;
      border: 1px solid #FF6B35;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      box-shadow: 0 0 15px rgba(255, 107, 53, 0.3);
      max-width: 250px;
      z-index: 10;
    }
    .pulse {
      animation: pulse-border 2s infinite alternate;
    }
    @keyframes pulse-border {
      0% {
        stroke-width: 2px;
        stroke: #BD93F9;
      }
      100% {
        stroke-width: 3.5px;
        stroke: #FF6B35;
        filter: drop-shadow(0 0 8px #FF6B35);
      }
    }
  </style>
</head>
<body>
  <h1>System Architecture Pipeline</h1>
  <div class="container">
    <div class="tooltip" id="tooltip">Hover over a module to inspect runtime details!</div>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850">
      <defs>
        <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="5" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
        <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="5" result="blur" />
          <feMerge>
            <feMergeNode in="blur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>

      <!-- Flow Lines / Connections -->
      <g stroke="#FF6B35" stroke-width="3.5" fill="none" stroke-linecap="round">
        <path d="M 500 90 L 500 135" />
        <path d="M 500 185 L 500 225" />
        <path d="M 500 275 L 500 315" />
        <path d="M 500 250 H 250 V 315" stroke-dasharray="5 5" stroke="#00D4FF" />
        <path d="M 500 365 V 400 H 350 V 435" />
        <path d="M 500 400 H 650 V 435" />
        <path d="M 350 485 V 520 H 500 V 555" />
        <path d="M 650 485 V 520 H 500" />
        <path d="M 500 605 L 500 645" />
        <path d="M 500 695 L 500 735" stroke-dasharray="5 5" stroke="#39D353" />
      </g>

      <!-- Animated Flow Dots -->
      <circle r="5" fill="#00D4FF">
        <animateMotion dur="2.5s" repeatCount="indefinite" path="M 500 90 L 500 135" />
      </circle>
      <circle r="5" fill="#BD93F9">
        <animateMotion dur="2s" repeatCount="indefinite" path="M 500 185 L 500 225" />
      </circle>
      <circle r="5" fill="#FFB86C">
        <animateMotion dur="3s" repeatCount="indefinite" path="M 500 275 L 500 315" />
      </circle>
      <circle r="4" fill="#00D4FF">
        <animateMotion dur="4s" repeatCount="indefinite" path="M 500 250 H 250 V 315" />
      </circle>
      <circle r="5" fill="#FF6B35">
        <animateMotion dur="3.5s" repeatCount="indefinite" path="M 500 365 V 400 H 350 V 435" />
      </circle>
      <circle r="5" fill="#FF6B35">
        <animateMotion dur="3.5s" repeatCount="indefinite" path="M 500 400 H 650 V 435" />
      </circle>
      <circle r="5" fill="#39D353">
        <animateMotion dur="2.8s" repeatCount="indefinite" path="M 500 605 L 500 645" />
      </circle>

      <!-- Node 1: Raw Data File (Cyan, Dashed) -->
      <g class="node" transform="translate(350, 40)" data-desc="data/raw/train.csv: Contains 913,000 transaction rows. This file is strictly read-only to prevent leakage or corruption.">
        <rect width="300" height="50" rx="6" fill="#1E1E2E" stroke="#00D4FF" stroke-width="2" stroke-dasharray="6 4" />
        <text x="150" y="24" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">data/raw/train.csv</text>
        <text x="150" y="40" fill="#00D4FF" font-family="sans-serif" font-size="10" text-anchor="middle">Raw Sales Transactions (Read-only)</text>
      </g>

      <!-- Node 2: Data Loader (Purple, Glowing) -->
      <g class="node" transform="translate(325, 135)" data-desc="src/data_loader.py: Parses dates, checks counts, and clips negative records at a minimum value of 1.">
        <rect class="pulse" width="350" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
        <text x="175" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">src/data_loader.py</text>
        <text x="175" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">Parses dates, clips sales &gt;= 1</text>
        <!-- Badge -->
        <rect x="280" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
        <text x="310" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ 0.3s</text>
      </g>

      <!-- Node 3: Features.py (Purple, Glowing) -->
      <g class="node" transform="translate(325, 225)" data-desc="src/features.py: Main feature builder. Extracts calendar features, US holiday schedules, lags, and rolling metrics. Runs in C-speed.">
        <rect width="350" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
        <text x="175" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">src/features.py</text>
        <text x="175" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">Lags, rolling stats, holidays</text>
        <!-- Badge -->
        <rect x="280" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
        <text x="310" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ 7.0s</text>
      </g>

      <!-- Node 4: Processed Features CSV (Cyan, Dashed) -->
      <g class="node" transform="translate(100, 315)" data-desc="data/processed/features.csv: The engineered dataset. Contains 730,500 feature rows after dropping cold start dates. Size is 271MB.">
        <rect width="300" height="50" rx="6" fill="#1E1E2E" stroke="#00D4FF" stroke-width="2" stroke-dasharray="6 4" />
        <text x="150" y="24" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">data/processed/features.csv</text>
        <text x="150" y="40" fill="#00D4FF" font-family="sans-serif" font-size="10" text-anchor="middle">271MB written to disk (No leakage)</text>
      </g>

      <!-- Node 5: Model.py (Purple, Glowing) -->
      <g class="node" transform="translate(325, 315)" data-desc="src/model.py: Configures LightGBM, trains with early stopping (best iteration ~463), and saves residuals for bootstrapping.">
        <rect class="pulse" width="350" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
        <text x="175" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">src/model.py</text>
        <text x="175" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">Trains LightGBM, saves residuals</text>
        <!-- Badge -->
        <rect x="280" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
        <text x="310" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ 45.0s</text>
      </g>

      <!-- Node 6: Evaluate.py (Purple, Glowing) -->
      <g class="node" transform="translate(175, 435)" data-desc="src/evaluate.py: Runs walk-forward evaluation across 4 folds to test out-of-sample stability.">
        <rect width="320" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
        <text x="160" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">src/evaluate.py</text>
        <text x="160" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">4-fold walk-forward backtest</text>
        <!-- Badge -->
        <rect x="250" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
        <text x="280" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ 12.0s</text>
      </g>

      <!-- Node 7: Prediction Intervals (Purple, Glowing) -->
      <g class="node" transform="translate(505, 435)" data-desc="Prediction Intervals: Generates safety margins using non-parametric residual bootstrapping with 100 simulation loops.">
        <rect width="320" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
        <text x="160" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Prediction Intervals</text>
        <text x="160" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">100 bootstrap loops</text>
        <!-- Badge -->
        <rect x="250" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
        <text x="280" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ 8.0s</text>
      </g>

      <!-- Node 8: Inventory.py (Purple, Glowing) -->
      <g class="node" transform="translate(325, 555)" data-desc="src/inventory.py: Translates forecast errors into stockout and holding costs (INR) to calculate cash value.">
        <rect width="350" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
        <text x="175" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">src/inventory.py</text>
        <text x="175" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">Converts errors to INR savings</text>
        <!-- Badge -->
        <rect x="280" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
        <text x="310" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ 2.0s</text>
      </g>

      <!-- Node 9: Main.py (Purple, Glowing) -->
      <g class="node" transform="translate(325, 645)" data-desc="main.py: Coordinates all steps of the pipeline, loading data, building features, training models, and saving evaluation plots.">
        <rect class="pulse" width="350" height="50" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
        <text x="175" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">main.py</text>
        <text x="175" y="38" fill="#BD93F9" font-family="sans-serif" font-size="11" text-anchor="middle">Pipeline coordinator</text>
        <!-- Badge -->
        <rect x="280" y="10" width="60" height="16" rx="4" fill="#FFB86C" />
        <text x="310" y="21" fill="#0D1117" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">⏱ ~67s</text>
      </g>

      <!-- Node 10: Outputs (Green, Glowing/Solid) -->
      <g class="node" transform="translate(325, 735)" data-desc="outputs/plots &amp; results: Exports 10 Matplotlib figures and prediction tables directly in data/results and data/plots.">
        <rect width="350" height="50" rx="8" fill="#1E1E2E" stroke="#39D353" stroke-width="2" filter="url(#glow-orange)" />
        <text x="175" y="22" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">outputs/plots &amp; results</text>
        <text x="175" y="38" fill="#39D353" font-family="sans-serif" font-size="11" text-anchor="middle">Saves 10 plots + results CSVs</text>
      </g>
    </svg>
  </div>

  <script>
    const nodes = document.querySelectorAll('.node');
    const tooltip = document.getElementById('tooltip');

    nodes.forEach(node => {
      node.addEventListener('mousemove', (e) => {
        const desc = node.getAttribute('data-desc');
        tooltip.textContent = desc;
        tooltip.style.opacity = '1';
        tooltip.style.left = (e.pageX - 100) + 'px';
        tooltip.style.top = (e.pageY - 90) + 'px';
      });

      node.addEventListener('mouseleave', () => {
        tooltip.style.opacity = '0';
      });
    });
  </script>
</body>
</html>
