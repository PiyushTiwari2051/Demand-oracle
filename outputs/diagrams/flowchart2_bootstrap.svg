<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <defs>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1000" height="800" fill="#0D1117" />

  <!-- Flow Lines / Connections -->
  <g stroke="#FF6B35" stroke-width="2.5" fill="none" stroke-linecap="round">
    <!-- Step 1 to Step 2 -->
    <path d="M 350 90 V 130 H 500 V 165" />
    <path d="M 650 90 V 130 H 500" />
    
    <!-- Step 2 to Step 3 -->
    <path d="M 500 245 L 500 300" />

    <!-- Step 3 Fan Lines (Colored Paths) -->
    <!-- Draw 1 (Purple) -->
    <path d="M 500 300 C 450 320, 200 320, 200 380" stroke="#BD93F9" stroke-dasharray="4 2" />
    <!-- Draw 2 (Cyan) -->
    <path d="M 500 300 C 480 320, 350 320, 350 380" stroke="#00D4FF" stroke-dasharray="4 2" />
    <!-- Draw 3 (Yellow) -->
    <path d="M 500 300 C 500 320, 500 320, 500 380" stroke="#FFB86C" stroke-dasharray="4 2" />
    <!-- Draw 4 (Orange) -->
    <path d="M 500 300 C 520 320, 650 320, 650 380" stroke="#FF6B35" stroke-dasharray="4 2" />
    <!-- Draw 5 (Green) -->
    <path d="M 500 300 C 550 320, 800 320, 800 380" stroke="#39D353" stroke-dasharray="4 2" />

    <!-- Step 3 targets to Step 4 Merge -->
    <path d="M 200 430 V 470 H 500 V 510" stroke="#BD93F9" />
    <path d="M 350 430 V 470 H 500" stroke="#00D4FF" />
    <path d="M 500 430 V 470" stroke="#FFB86C" />
    <path d="M 650 430 V 470 H 500" stroke="#FF6B35" />
    <path d="M 800 430 V 470 H 500" stroke="#39D353" />

    <!-- Step 4 to Step 5 -->
    <path d="M 500 590 V 630 H 220 V 665" />
    <path d="M 500 590 V 665" />
    <path d="M 500 630 H 780 V 665" />
  </g>

  <!-- Labels -->
  <text x="500" y="275" fill="#F8F8F2" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Uniform random choice (with replacement)</text>
  <text x="500" y="478" fill="#F8F8F2" font-family="sans-serif" font-size="11" text-anchor="middle">x 100 total bootstrap draws</text>

  <!-- STEP 1: Inputs -->
  <g transform="translate(200, 40)">
    <rect width="300" height="50" rx="6" fill="#1E1E2E" stroke="#00D4FF" stroke-width="2" stroke-dasharray="4 4" />
    <text x="150" y="30" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Actual Sales (y)</text>
  </g>
  <g transform="translate(500, 40)">
    <rect width="300" height="50" rx="6" fill="#1E1E2E" stroke="#00D4FF" stroke-width="2" stroke-dasharray="4 4" />
    <text x="150" y="30" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Model Predictions (ŷ)</text>
  </g>

  <!-- STEP 2: Training Residuals -->
  <g transform="translate(325, 165)">
    <rect width="350" height="80" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
    <text x="175" y="25" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Training Residuals {e}</text>
    <text x="175" y="42" fill="#BD93F9" font-family="sans-serif" font-size="10" text-anchor="middle">e = y - ŷ (Error Distribution)</text>
    <!-- Mini normal curve visual inside node -->
    <path d="M 120 70 Q 175 45, 230 70" fill="none" stroke="#BD93F9" stroke-width="1.5" />
    <line x1="100" y1="70" x2="250" y2="70" stroke="#F8F8F2" stroke-width="0.8" stroke-dasharray="2 2" />
  </g>

  <!-- STEP 3: Fan Out draws -->
  <!-- Draw 1 -->
  <g transform="translate(100, 380)">
    <rect width="200" height="50" rx="6" fill="#1E1E2E" stroke="#BD93F9" stroke-width="1.5" />
    <text x="100" y="24" fill="#F8F8F2" font-family="monospace" font-size="12" text-anchor="middle">draw_01</text>
    <text x="100" y="40" fill="#BD93F9" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">ŷ + 2.3</text>
  </g>
  <!-- Draw 2 -->
  <g transform="translate(250, 380)">
    <rect width="200" height="50" rx="6" fill="#1E1E2E" stroke="#00D4FF" stroke-width="1.5" />
    <text x="100" y="24" fill="#F8F8F2" font-family="monospace" font-size="12" text-anchor="middle">draw_02</text>
    <text x="100" y="40" fill="#00D4FF" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">ŷ - 0.7</text>
  </g>
  <!-- Draw 3 -->
  <g transform="translate(400, 380)">
    <rect width="200" height="50" rx="6" fill="#1E1E2E" stroke="#FFB86C" stroke-width="1.5" />
    <text x="100" y="24" fill="#F8F8F2" font-family="monospace" font-size="12" text-anchor="middle">draw_03</text>
    <text x="100" y="40" fill="#FFB86C" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">ŷ + 5.1</text>
  </g>
  <!-- Draw 4 -->
  <g transform="translate(550, 380)">
    <rect width="200" height="50" rx="6" fill="#1E1E2E" stroke="#FF6B35" stroke-width="1.5" />
    <text x="100" y="24" fill="#F8F8F2" font-family="monospace" font-size="12" text-anchor="middle">draw_04</text>
    <text x="100" y="40" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">ŷ - 3.2</text>
  </g>
  <!-- Draw 5 -->
  <g transform="translate(700, 380)">
    <rect width="200" height="50" rx="6" fill="#1E1E2E" stroke="#39D353" stroke-width="1.5" />
    <text x="100" y="24" fill="#F8F8F2" font-family="monospace" font-size="12" text-anchor="middle">draw_05</text>
    <text x="100" y="40" fill="#39D353" font-family="monospace" font-size="11" font-weight="bold" text-anchor="middle">ŷ + 0.4</text>
  </g>

  <!-- STEP 4: Bootstrap Distribution -->
  <g transform="translate(300, 510)">
    <rect width="400" height="80" rx="8" fill="#1E1E2E" stroke="#BD93F9" stroke-width="2" filter="url(#glow-purple)" />
    <text x="200" y="30" fill="#F8F8F2" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">Bootstrap Forecasts (B = 100)</text>
    <text x="200" y="50" fill="#BD93F9" font-family="sans-serif" font-size="10" text-anchor="middle">Sort predictions and extract percentiles</text>
    <path d="M 120 70 L 280 70" stroke="#BD93F9" stroke-width="1" stroke-dasharray="2 2" />
  </g>

  <!-- STEP 5: Outputs -->
  <!-- Lower Bound (Green) -->
  <g transform="translate(70, 665)">
    <rect width="300" height="60" rx="8" fill="#1E1E2E" stroke="#39D353" stroke-width="2" filter="url(#glow-green)" />
    <text x="150" y="25" fill="#F8F8F2" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">P5 Lower Bound</text>
    <text x="150" y="45" fill="#39D353" font-family="sans-serif" font-size="11" text-anchor="middle">Minimum safety stock line</text>
  </g>
  <!-- Point Forecast (Orange) -->
  <g transform="translate(400, 665)">
    <rect width="200" height="60" rx="8" fill="#1E1E2E" stroke="#FF6B35" stroke-width="2" filter="url(#glow-orange)" />
    <text x="100" y="25" fill="#F8F8F2" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">Point Forecast ŷ</text>
    <text x="100" y="45" fill="#FF6B35" font-family="sans-serif" font-size="11" text-anchor="middle">Optimal target guess</text>
  </g>
  <!-- Upper Bound (Green) -->
  <g transform="translate(630, 665)">
    <rect width="300" height="60" rx="8" fill="#1E1E2E" stroke="#39D353" stroke-width="2" filter="url(#glow-green)" />
    <text x="150" y="25" fill="#F8F8F2" font-family="monospace" font-size="13" font-weight="bold" text-anchor="middle">P95 Upper Bound</text>
    <text x="150" y="45" fill="#39D353" font-family="sans-serif" font-size="11" text-anchor="middle">Maximum safety stock line</text>
  </g>
</svg>
